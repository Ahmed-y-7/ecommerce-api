services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8801:8000"
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
